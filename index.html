<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <meta name="theme-color" content="#cc0000" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="PF Stock" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="application-name" content="PF Stock" />
  <meta name="description" content="Gestión de inventario de repuestos industriales — v0.9.0-beta" />

  <title>PF Stock</title>

  <link rel="manifest" href="./manifest.json" />

  <!-- Apple touch icon (Safari "Add to Home Screen") -->
  <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png" />
  <link rel="apple-touch-icon" sizes="152x152" href="./icons/icon-152x152.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="./icons/icon-180x180.png" />

  <!-- Favicons -->
  <link rel="icon" type="image/x-icon" href="./icons/favicon.ico" />
  <link rel="icon" type="image/png" sizes="16x16" href="./icons/favicon-16x16.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="./icons/favicon-32x32.png" />

  <style>
    html, body {
      margin: 0; padding: 0;
      background: #ffffff;
      overscroll-behavior: none;
    }
    #root {
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
    }
    #splash {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      height: 100vh;
      font-family: system-ui, -apple-system, sans-serif;
      color: #6b7280; font-size: 14px; gap: 12px;
    }
    #splash svg { animation: spin 1.1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    #pf-update-banner {
      position: fixed; left: 12px; right: 12px; bottom: 12px;
      max-width: 420px; margin: 0 auto;
      background: #111827; color: #fff;
      border-radius: 12px; padding: 14px 16px;
      display: none; align-items: center; gap: 12px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.25);
      z-index: 9999; font-family: system-ui, -apple-system, sans-serif;
      padding-bottom: calc(14px + env(safe-area-inset-bottom));
    }
    #pf-update-banner.show { display: flex; }
    #pf-update-banner span { flex: 1; font-size: 13px; line-height: 1.4; }
    #pf-update-banner button {
      flex-shrink: 0; background: #cc0000; color: #fff; border: none;
      border-radius: 8px; padding: 8px 14px; font-size: 13px; font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div id="root">
    <div id="splash">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none"
           stroke="#cc0000" stroke-width="2.5" stroke-linecap="round">
        <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83
                 M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
      </svg>
      Cargando PF Stock…
    </div>
  </div>

  <div id="pf-update-banner">
    <span>Hay una nueva versión de PF Stock disponible.</span>
    <button id="pf-update-btn" type="button">Actualizar ahora</button>
  </div>

  <script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"
          onload="window.__pfReactLoaded=true" onerror="window.__pfReactError=true"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"
          onload="window.__pfReactDomLoaded=true" onerror="window.__pfReactDomError=true"></script>
  <script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"
          onload="window.__pfBabelLoaded=true" onerror="window.__pfBabelError=true"></script>

  <script>
    // ---- Service worker registration + in-app update banner ----
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker
          .register('/service-worker.js', { scope: '/' })
          .then(function (reg) {
            function showUpdateBanner(worker) {
              var banner = document.getElementById('pf-update-banner');
              var btn = document.getElementById('pf-update-btn');
              if (!banner || !btn) return;
              banner.classList.add('show');
              btn.onclick = function () {
                btn.disabled = true;
                worker.postMessage({ type: 'SKIP_WAITING' });
              };
            }

            // A previously-fetched update may already be waiting.
            if (reg.waiting && navigator.serviceWorker.controller) {
              showUpdateBanner(reg.waiting);
            }

            reg.addEventListener('updatefound', function () {
              var newWorker = reg.installing;
              if (!newWorker) return;
              newWorker.addEventListener('statechange', function () {
                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                  showUpdateBanner(newWorker);
                }
              });
            });
          })
          .catch(function (err) { console.warn('[SW] registration failed:', err); });

        // Reload once the new worker takes control — never in a loop,
        // and only ever after the user clicks "Actualizar ahora".
        var pfReloaded = false;
        navigator.serviceWorker.addEventListener('controllerchange', function () {
          if (pfReloaded) return;
          pfReloaded = true;
          window.location.reload();
        });
      });
    }
  </script>

  <script>
    // ---- Safe React/ReactDOM/Babel readiness guard before running app.jsx ----
    // app.jsx destructures window.React at its top level; if the CDN failed
    // (network error, ad-blocker, preview sandbox, slow connection) it must
    // never execute against an undefined React — show a clear error instead.
    (function () {
      function fatal(msg) {
        var el = document.getElementById('root');
        if (el) {
          el.innerHTML =
            '<div style="padding:32px;font-family:system-ui;color:#b91c1c">' +
            '<b>' + msg + '</b></div>';
        }
      }

      function ready() {
        return !!(window.React && window.ReactDOM && window.Babel);
      }

      function mount() {
        if (!window.__AppRoot) {
          fatal('Error al cargar la aplicaci\u00f3n. Recarga la p\u00e1gina.');
          return;
        }
        var splash = document.getElementById('splash');
        if (splash) splash.remove();
        var root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(window.__AppRoot));
      }

      function loadApp() {
        fetch('./app.jsx')
          .then(function (res) {
            if (!res.ok) throw new Error('HTTP ' + res.status);
            return res.text();
          })
          .then(function (src) {
            var compiled = window.Babel.transform(src, { presets: ['react', 'env'] }).code;
            new Function(compiled)();
            mount();
          })
          .catch(function (err) {
            console.error('[PF Stock] app.jsx load/transform failed:', err);
            fatal('No se pudo cargar la aplicaci\u00f3n. Recarga la p\u00e1gina.');
          });
      }

      var tries = 0;
      var maxTries = 100; // ~10s at 100ms poll interval

      (function waitForReact() {
        if (window.__pfReactError || window.__pfReactDomError || window.__pfBabelError) {
          fatal('No se pudieron cargar los recursos necesarios (React/Babel). Verifica tu conexi\u00f3n y recarga la p\u00e1gina.');
          return;
        }
        if (ready()) {
          loadApp();
          return;
        }
        tries++;
        if (tries > maxTries) {
          fatal('No se pudo inicializar React a tiempo. Verifica tu conexi\u00f3n y recarga la p\u00e1gina.');
          return;
        }
        setTimeout(waitForReact, 100);
      })();
    })();
  </script>
</body>
</html>
