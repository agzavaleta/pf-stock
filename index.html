<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <meta name="theme-color" content="#cc0000" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="PF Stock" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="application-name" content="PF Stock" />
  <meta name="description" content="Gestión de inventario de repuestos industriales — v0.9.0-beta" />

  <title>PF Stock</title>

  <link rel="manifest" href="./manifest.json" />

  <!-- Apple touch icon (Safari "Add to Home Screen") -->
  <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png" />
  <link rel="apple-touch-icon" sizes="152x152" href="./icons/icon-152x152.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="./icons/icon-180x180.png" />

  <!-- Favicons -->
  <link rel="icon" type="image/x-icon" href="./icons/favicon.ico" />
  <link rel="icon" type="image/png" sizes="16x16" href="./icons/favicon-16x16.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="./icons/favicon-32x32.png" />

  <style>
    html, body {
      margin: 0; padding: 0;
      background: #ffffff;
      overscroll-behavior: none;
    }
    #root {
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
    }
    #splash {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      height: 100vh;
      font-family: system-ui, -apple-system, sans-serif;
      color: #6b7280; font-size: 14px; gap: 12px;
    }
    #splash svg { animation: spin 1.1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="root">
    <div id="splash">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none"
           stroke="#cc0000" stroke-width="2.5" stroke-linecap="round">
        <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83
                 M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
      </svg>
      Cargando PF Stock…
    </div>
  </div>

  <script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker
          .register('./service-worker.js', { scope: './' })
          .catch(function (err) { console.warn('[SW] registration failed:', err); });
      });
    }
  </script>

  <script type="text/babel" src="./app.jsx" data-presets="react,env"></script>

  <script type="text/babel" data-presets="react,env">
    (function () {
      if (!window.__AppRoot) {
        document.getElementById('root').innerHTML =
          '<div style="padding:32px;font-family:system-ui;color:#b91c1c">' +
          '<b>Error al cargar la aplicaci\u00f3n.</b> Recarga la p\u00e1gina.' +
          '</div>';
        return;
      }
      var splash = document.getElementById('splash');
      if (splash) splash.remove();
      var root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(React.createElement(window.__AppRoot));
    })();
  </script>
</body>
</html>
